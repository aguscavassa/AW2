<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AW2 - Register</title>
    </head>
    <body>
        <div class="d-flex flex-column align-items-center" style="height: 100vh;">
            <div class="my-5 px-4 py-4 text-center w-50">
                <h1 class="display-5 fw-bold">Registrarse</h1>
                <div class="col-lg-6 mx-auto">
                    <p class="lead mb-4">Ingrese sus credenciales para registrarse.</p>
                </div>
                <form class="col-lg-6 mx-auto" id="register-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg px-4">Registrarse</button>
                </form>
            </div>
        </div>
    </body>
</html>
