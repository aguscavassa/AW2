<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AW2 - Home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    </head>
    <body>
        <div class="d-flex flex-column align-items-center" style="height: 100vh;">
            <div class="my-5 px-4 py-4 text-center w-100">
                <h1 class="display-5 fw-bold">AW2</h1>
                <div class="col-lg-6 mx-auto">
                    <p class="lead mb-4">En esta pagina se pueden ver los productos e iniciar sesión para concretar una compra.</p>
                </div>
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <button type="button" class="btn btn-primary btn-lg px-4 gap-3" id="productos-btn">Ver Productos</button>
                    <button type="button" class="btn btn-outline-secondary btn-lg px-4" id="login-btn">Iniciar Sesión</button>
                    <button type="button" class="btn btn-outline-secondary btn-lg px-4" id="register-btn">Registrarse</button>
                    <button type="button" class="btn btn-success btn-lg px-4" id="carrito-btn">Ver Carrito</button>
                </div>
            </div>
        </div>
    </body>
</html>
